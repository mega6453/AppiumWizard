name: Executable Artifact

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        configuration: [Release]
    runs-on: windows-latest
    env:
      Solution_Name: Appium Wizard

    steps:
    - name: Checkout
      uses: actions/checkout@v3
      with:
        fetch-depth: 0
    
    - name: Update Google Analytics Secrets
      shell: pwsh
      env:
        APISecret: ${{ secrets.GOOGLEANALYTICSAPISECRET }}
        MeasurementId: ${{ secrets.GOOGLEANALYTICSMEASUREMENTID }}
      run: |
        $file = "$env:GITHUB_WORKSPACE\Appium Wizard\GoogleAnalytics.cs"
        (Get-Content $file) -replace "{GOOGLEANALYTICSAPISECRET}", "$env:APISecret" | Set-Content $file
        (Get-Content $file) -replace "{GOOGLEANALYTICSMEASUREMENTID}", "$env:MeasurementId" | Set-Content $file
      
    - name: Install .NET Core
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 8.0.x

    - name: Restore
      run: dotnet restore "Appium Wizard"

    # ✅ FIXED (no single file → avoids temp extraction issue)
    - name: Build and publish app
      run: dotnet publish "Appium Wizard" -c Release -r win-x64 --self-contained true

    # 🧪 Debug (optional but useful)
    - name: Debug publish folder
      run: dir "Appium Wizard/bin/Release/net8.0-windows10.0.17763.0/win-x64/publish"

    - name: Archive publish output
      uses: actions/upload-artifact@v4
      with:
        name: app
        path: "Appium Wizard/bin/Release/net8.0-windows10.0.17763.0/win-x64/publish"
        
    - name: Install Chocolatey
      run: |
        Set-ExecutionPolicy Bypass -Scope Process -Force
        iex ((New-Object System.Net.WebClient).DownloadString('https://chocolatey.org/install.ps1'))

    - name: Install Inno Setup
      run: choco install innosetup -y

    # ✅ CRITICAL FIX: set correct working directory
    - name: Compile Installer
      run: |
        cd "Appium Wizard/bin/Release/net8.0-windows10.0.17763.0/win-x64/publish/ExcludeInInstaller"
        ISCC /Q "Installer Script.iss"

    - name: Get Version
      id: get_version
      shell: pwsh
      run: |
        $file = "$env:GITHUB_WORKSPACE\Appium Wizard\VersionInfo.cs"
        $version = Select-String -Pattern 'VersionNumber\s*=\s*"(.*)";' -Path $file | % { $_.Matches.Groups[1].Value }
        $notes = Select-String -Pattern 'ReleaseNotes\s*=\s*"(.*)";' -Path $file | % { $_.Matches.Groups[1].Value }
        echo "version=$version" >> $env:GITHUB_OUTPUT
        echo "releasenotes=$notes" >> $env:GITHUB_OUTPUT

    # ✅ FIXED PATH (relative, not hardcoded D:\a\...)
    - name: Upload Installer EXE
      uses: actions/upload-artifact@v4
      with:
        name: AppiumWizard
        path: "Appium Wizard/bin/Release/net8.0-windows10.0.17763.0/win-x64/publish/ExcludeInInstaller/output/AppiumWizard.exe"
